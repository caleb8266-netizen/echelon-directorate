function loadFromStorage(key, fallback) {

function saveToStorage(key, value) {

}

// ─────────────────────────────────────────────────────────────────────────────
// IMAGE COMPRESSION  (iPhone photos → ~200KB)
// ─────────────────────────────────────────────────────────────────────────────
function compressImage(file, maxWidth = 900, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload  = ({ target: { result } }) => {
      const img = new Image();
      img.onerror = reject;
      img.onload  = () => {
        const scale  = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = result;
    };
    reader.readAsDataURL(file);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso), diff = Date.now() - d;
  if (diff < 60000)     return "just now";
  if (diff < 3600000)   return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000)  return d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
  if (diff < 604800000) return d.toLocaleDateString("en-US", { weekday:"short" });
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}

function useTypewriter(lines, delay = 14, startDelay = 0) {
  const [displayed, setDisplayed] = useState([]);
  const [done,      setDone]      = useState(false);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      await sleep(startDelay);
      const out = [];
      for (const line of lines) {
        if (cancelled) return;
        out.push(""); setDisplayed([...out]);
        for (let c = 0; c < line.length; c++) {
          if (cancelled) return;
          out[out.length - 1] = line.slice(0, c + 1);
          setDisplayed([...out]);
          await sleep(delay);
        }
        await sleep(50);
      }
      if (!cancelled) setDone(true);
    })();
    return () => { cancelled = true; };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  return { displayed, done };
}

// BOOT SEQUENCE
// ─────────────────────────────────────────────────────────────────────────────
function BootSequence({ onComplete }) {
  const { displayed, done } = useTypewriter(BOOT_LINES, 12, 100);
  const [progress, setProgress] = useState(0);
  const [entering, setEntering] = useState(false);

  useEffect(() => {
    if (!done) return;
    let p = 0;
    const iv = setInterval(() => {
      p += 5; setProgress(Math.min(p, 100));
      if (p >= 100) { clearInterval(iv); setEntering(true); setTimeout(onComplete, 350); }
    }, 8);
    return () => clearInterval(iv);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [done]);

  return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, animation:"flicker 8s infinite" }}>
      <EDLogo size={60} color={C.silver} glow/>
      <h1 style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:20, fontWeight:700, letterSpacing:"0.45em", color:C.amber, marginTop:14, marginBottom:4, textAlign:"center" }}>
        THE ECHELON DIRECTORATE
      </h1>
      <p style={{ fontSize:8, color:C.grey, letterSpacing:"0.35em", marginBottom:30, textAlign:"center" }}>
        PRESERVE // CONTROL // ASCEND
      </p>
      <div style={{ width:"100%", maxWidth:360, background:C.panel, border:`1px solid ${C.borderBright}`, borderRadius:8, overflow:"hidden" }}>
        <div style={{ background:C.blueFaint, borderBottom:`1px solid ${C.border}`, padding:"6px 14px", display:"flex", alignItems:"center", gap:6, fontSize:9, color:C.grey, letterSpacing:"0.1em" }}>
          <span style={{ color:C.red }}>●</span>
          <span style={{ color:C.amber }}>●</span>
          <span style={{ color:C.blue }}>●</span>
          <span style={{ flex:1, textAlign:"center" }}>SECURE TERMINAL</span>
        </div>
        <div style={{ padding:"18px 20px", minHeight:100, fontSize:12, lineHeight:2 }}>
          {displayed.map((line,i) => (
            <div key={i} style={{
              color:         line.startsWith("  WELCOME") ? C.white : line.startsWith("▸") ? C.blue : C.greyLight,
              fontFamily:    line.startsWith("  ") ? "'Rajdhani',sans-serif" : "'Share Tech Mono',monospace",
              fontWeight:    line.startsWith("  ") ? 600 : 400,
              fontSize:      line.startsWith("  ") ? 15 : 12,
              letterSpacing: line.startsWith("  ") ? "0.2em" : "0.04em",
            }}>
              {line || "\u00a0"}
            </div>
          ))}
          {!done && <span style={{ animation:"blink 1s infinite", color:C.blue }}>█</span>}
        </div>
        {done && (
          <div style={{ padding:"0 20px 16px" }}>
            <div style={{ height:2, background:C.blueFaint, borderRadius:1, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${progress}%`, background:`linear-gradient(90deg,${C.blueDim},${C.blue})`, transition:"width 0.02s" }}/>
            </div>
          </div>
        )}
      </div>
      {entering && (
        <p style={{ marginTop:16, fontSize:9, letterSpacing:"0.3em", color:C.amber, animation:"blink 0.4s infinite", fontFamily:"'Rajdhani',sans-serif" }}>
          ► ENTERING ARCHIVE
        </p>
      )}
    </div>
  );
}

          style={{ width:"100%", background:C.blue, border:"none", borderRadius:10, padding:"14px", color:C.bg, fontFamily:"'Rajdhani',sans-serif", fontSize:14, fontWeight:700, letterSpacing:"0.2em", cursor:"pointer", marginTop:4 }}>
          CREATE DOSSIER
        </button>
      </div>
    </BottomSheet>
  );
}

// DOSSIER LIST

            <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:16, fontWeight:700, letterSpacing:"0.35em", color:C.amber }}>ECHELON DIRECTORATE</div>
            <div style={{ fontSize:8, color:C.grey, letterSpacing:"0.2em", marginTop:1 }}>STORY ARCHIVE</div>

        </div>
        <div style={{ position:"relative", marginBottom:10 }}>
          <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", fontSize:13, color:C.muted, pointerEvents:"none" }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search dossiers..."
            style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 10px 9px 32px", color:C.white, fontSize:12, outline:"none" }}/>
        </div>
        <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:2 }}>

      {/* Stats */}

            <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:22, fontWeight:700, color:s.color, lineHeight:1 }}>{s.val}</div>
            <div style={{ fontSize:7, color:C.muted, letterSpacing:"0.15em", marginTop:3 }}>{s.label}</div>

      {/* List */}

      {/* Footer */}

        <span>E.D. ARCHIVE // FOR THE CONTINUITY. FOR THE ECHELON.</span>
        <span style={{ animation:"blink 3s infinite", color:C.blueDim }}>● SECURE</span>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// CHAPTERS PANEL (bottom sheet inside dossier)
// ─────────────────────────────────────────────────────────────────────────────
function ChaptersSheet({ story, onUpdate, onClose }) {
  const [adding,    setAdding]    = useState(false);
  const [newTitle,  setNewTitle]  = useState("");
  const [activeChapter, setActiveChapter] = useState(null);
  const chapCounter = useRef(Date.now());

  const chapDone  = story.chapters?.filter(c=>c.done).length||0;
  const chapTotal = story.chapters?.length||0;

  const addChapter = () => {
    if (!newTitle.trim()) return;
    onUpdate({ chapters:[...(story.chapters||[]), { id:chapCounter.current++, title:newTitle.trim(), done:false, content:"" }] });
    setNewTitle(""); setAdding(false);
  };
  const toggleChapter = id => onUpdate({ chapters:story.chapters.map(c=>c.id===id?{...c,done:!c.done}:c) });
  const deleteChapter = id => onUpdate({ chapters:story.chapters.filter(c=>c.id!==id) });
  const saveChapter   = updated => { onUpdate({ chapters:story.chapters.map(c=>c.id===updated.id?updated:c) }); setActiveChapter(null); };

  if (activeChapter) {
    return (
      <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:300, display:"flex", flexDirection:"column", animation:"fadeIn 0.2s ease both" }}>
        <div style={{ background:C.panel, borderBottom:`1px solid ${C.border}`, padding:"12px 18px", paddingTop:"max(12px,env(safe-area-inset-top,12px))", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
          <button onClick={()=>{ saveChapter(activeChapter); }}
            style={{ background:"transparent", border:"none", color:C.blue, fontSize:13, cursor:"pointer", letterSpacing:"0.1em", padding:0, flexShrink:0 }}>
            ‹ BACK
          </button>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontFamily:"'Special Elite',serif", fontSize:14, color:C.white, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{activeChapter.title}</div>
            <div style={{ fontSize:8, color:C.muted, letterSpacing:"0.1em", marginTop:2 }}>{activeChapter.done ? "✓ COMPLETE" : "IN PROGRESS"}</div>
          </div>
          <button onClick={()=>{ const updated={...activeChapter,done:!activeChapter.done}; setActiveChapter(updated); onUpdate({ chapters:story.chapters.map(c=>c.id===updated.id?updated:c) }); }}
            style={{ background:activeChapter.done?"rgba(80,170,96,0.15)":"transparent", border:`1px solid ${activeChapter.done?C.green:C.border}`, borderRadius:8, padding:"5px 10px", color:activeChapter.done?C.green:C.grey, fontSize:9, letterSpacing:"0.12em", cursor:"pointer", flexShrink:0 }}>
            {activeChapter.done ? "✓ DONE" : "MARK DONE"}
          </button>
        </div>
        <textarea
          value={activeChapter.content||""}
          onChange={e=>setActiveChapter({...activeChapter,content:e.target.value})}
          autoFocus
          placeholder={`Write notes for "${activeChapter.title}" here...\n\nScene ideas, dialogue, character beats, research — anything that belongs in this chapter.`}
          style={{ flex:1, width:"100%", background:"transparent", border:"none", resize:"none", color:C.white, fontFamily:"'Special Elite',serif", fontSize:16, lineHeight:1.95, padding:"22px 22px", outline:"none", overflowY:"scroll", WebkitOverflowScrolling:"touch", paddingBottom:"max(30px,env(safe-area-inset-bottom,30px))" }}
        />
        <div style={{ background:C.panel, borderTop:`1px solid ${C.border}`, padding:"6px 18px", paddingBottom:"max(6px,env(safe-area-inset-bottom,6px))", fontSize:9, color:C.muted, textAlign:"right", letterSpacing:"0.1em", flexShrink:0 }}>
          {(activeChapter.content||"").split(/\s+/).filter(Boolean).length} words
        </div>
      </div>
    );
  }

  return (
    <BottomSheet title="CHAPTERS" onClose={onClose}>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        {chapTotal>0 && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:C.grey, letterSpacing:"0.12em", marginBottom:6 }}>
              <span>PROGRESS</span><span>{chapDone}/{chapTotal} COMPLETE</span>
            </div>
            <div style={{ height:3, background:C.blueFaint, borderRadius:2, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${chapTotal?(chapDone/chapTotal)*100:0}%`, background:`linear-gradient(90deg,${C.blueDim},${C.blue})`, transition:"width 0.3s" }}/>
            </div>
          </div>
        )}

        <button onClick={()=>setAdding(v=>!v)}
          style={{ background:adding?C.blueFaint:"transparent", border:`1px solid ${adding?C.blue:C.border}`, borderRadius:8, padding:"9px 14px", color:adding?C.blue:C.grey, fontSize:10, letterSpacing:"0.15em", cursor:"pointer" }}>
          {adding ? "CANCEL" : "+ ADD CHAPTER"}
        </button>

        {adding && (
          <div style={{ display:"flex", gap:7, animation:"fadeUp 0.15s ease both" }}>
            <input value={newTitle} onChange={e=>setNewTitle(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addChapter()} placeholder="Chapter title..." autoFocus
              style={{ flex:1, background:"rgba(255,255,255,0.05)", border:`1px solid ${C.blue}`, borderRadius:8, padding:"10px 13px", color:C.white, fontSize:13, outline:"none" }}/>
            <button onClick={addChapter}
              style={{ background:C.blue, border:"none", borderRadius:8, padding:"10px 16px", color:C.bg, fontSize:18, fontWeight:700, cursor:"pointer" }}>+</button>
          </div>
        )}

        {(story.chapters||[]).length===0 && !adding && (
          <p style={{ fontSize:11, color:C.muted, fontStyle:"italic", textAlign:"center", padding:"10px 0" }}>No chapters yet. Tap + Add Chapter to create one.</p>
        )}

        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {(story.chapters||[]).map(ch=>(
            <div key={ch.id} style={{ background:ch.done?"rgba(79,195,247,0.05)":"rgba(255,255,255,0.03)", border:`1px solid ${ch.done?C.blueDim:C.border}`, borderRadius:10, overflow:"hidden" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px" }}>
                <div onClick={()=>toggleChapter(ch.id)}
                  style={{ width:18, height:18, border:`2px solid ${ch.done?C.blue:C.muted}`, borderRadius:4, background:ch.done?C.blue:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer", transition:"all 0.12s" }}>
                  {ch.done && <span style={{ color:C.bg, fontSize:10, fontWeight:900 }}>✓</span>}
                </div>
                <div onClick={()=>setActiveChapter({...ch})} style={{ flex:1, cursor:"pointer" }}>
                  <div style={{ fontSize:13, color:ch.done?C.greyLight:C.white, textDecoration:ch.done?"line-through":"none" }}>{ch.title}</div>
                  <div style={{ fontSize:9, color:C.muted, marginTop:3, letterSpacing:"0.06em", fontStyle:(ch.content?"normal":"italic") }}>
                    {ch.content ? `${ch.content.split(/\s+/).filter(Boolean).length} words · tap to edit` : "tap to write notes"}
                  </div>
                </div>
                <span onClick={()=>setActiveChapter({...ch})} style={{ color:C.blue, fontSize:16, cursor:"pointer", flexShrink:0 }}>›</span>
                <button onClick={()=>deleteChapter(ch.id)}
                  style={{ background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:18, lineHeight:1, padding:"0 0 0 4px" }}>×</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </BottomSheet>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// EVIDENCE PANEL (bottom sheet inside dossier)
// ─────────────────────────────────────────────────────────────────────────────
function EvidenceSheet({ story, onUpdate, onClose }) {
  const [filterPicker, setFilterPicker] = useState(null);
  const [lightbox,     setLightbox]     = useState(null);
  const [uploading,    setUploading]    = useState(false);
  const fileInputRef = useRef(null);
  const evidCounter  = useRef(Date.now()+9000);

  const handleFile = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const compressed = await compressImage(file);
      setFilterPicker({ src:compressed });
    } catch (e) { console.error(e); }
    finally { setUploading(false); }
  };

  const handleFilterConfirm = (filter) => {
    const ev = { id:evidCounter.current++, src:filterPicker.src, filter, caption:"", addedAt:new Date().toISOString() };
    onUpdate({ evidence:[...(story.evidence||[]), ev] });
    setFilterPicker(null);
  };

  const updateCaption  = (id,cap) => onUpdate({ evidence:story.evidence.map(e=>e.id===id?{...e,caption:cap}:e) });
  const deleteEvidence = (id)     => { onUpdate({ evidence:story.evidence.filter(e=>e.id!==id) }); setLightbox(null); };

  return (
    <>
      <input ref={fileInputRef} type="file" accept="image/*" onChange={e=>{handleFile(e.target.files[0]);e.target.value="";}} style={{ display:"none" }}/>
      {filterPicker && <FilterPickerSheet src={filterPicker.src} onConfirm={handleFilterConfirm} onClose={()=>setFilterPicker(null)}/>}
      {uploading && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <span style={{ color:C.blue, fontFamily:"'Rajdhani',sans-serif", fontSize:14, letterSpacing:"0.3em", animation:"blink 1s infinite" }}>PROCESSING...</span>
        </div>
      )}

      {lightbox && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.97)", zIndex:400, display:"flex", flexDirection:"column", animation:"fadeIn 0.15s ease both" }}>
          <div style={{ padding:"16px 18px", paddingTop:"max(16px,env(safe-area-inset-top,16px))", display:"flex", justifyContent:"flex-end" }}>
            <button onClick={()=>setLightbox(null)} style={{ background:"transparent", border:"none", color:C.white, fontSize:30, cursor:"pointer", lineHeight:1 }}>✕</button>
          </div>
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 20px", overflowY:"auto" }}>
            <div style={{ width:"100%", maxWidth:500 }}>
              <CIAImage src={lightbox.src} filter={lightbox.filter} height={260} showStamp style={{ borderRadius:6, marginBottom:12 }}/>
            </div>
          </div>
          <div style={{ padding:"12px 20px", paddingBottom:"max(12px,env(safe-area-inset-bottom,12px))", display:"flex", flexDirection:"column", gap:8 }}>
            <input value={lightbox.caption||""} onChange={e=>{updateCaption(lightbox.id,e.target.value);setLightbox({...lightbox,caption:e.target.value});}}
              placeholder="Add a caption..."
              style={{ width:"100%", background:"rgba(255,255,255,0.07)", border:`1px solid ${C.border}`, borderRadius:8, padding:"11px 14px", color:C.white, fontSize:12, outline:"none" }}/>
            <button onClick={()=>deleteEvidence(lightbox.id)}
              style={{ width:"100%", background:"rgba(204,51,51,0.12)", border:`1px solid ${C.red}`, borderRadius:8, padding:"11px", color:C.red, fontSize:11, letterSpacing:"0.15em", cursor:"pointer" }}>
              DESTROY EVIDENCE
            </button>
          </div>
        </div>
      )}

      <BottomSheet title="EVIDENCE PHOTOS" onClose={onClose}>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <button onClick={()=>fileInputRef.current?.click()}
            style={{ width:"100%", background:"transparent", border:`1px solid ${C.border}`, borderRadius:8, padding:"11px 14px", color:C.grey, fontSize:10, letterSpacing:"0.15em", cursor:"pointer" }}>
            + ATTACH NEW PHOTO
          </button>
          {(story.evidence||[]).length===0 ? (
            <div onClick={()=>fileInputRef.current?.click()}
              style={{ border:`1.5px dashed ${C.border}`, borderRadius:12, padding:"28px 20px", textAlign:"center", cursor:"pointer" }}>
              <div style={{ fontSize:32, marginBottom:10 }}>📎</div>
              <p style={{ fontSize:12, color:C.muted, letterSpacing:"0.1em", margin:0 }}>TAP TO ATTACH EVIDENCE</p>
              <p style={{ fontSize:9, color:C.muted, marginTop:5, margin:0 }}>Photos, reference images, location shots</p>
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {(story.evidence||[]).map(ev => {
                const filterCSS = PHOTO_FILTERS.find(f=>f.id===ev.filter)?.css||PHOTO_FILTERS[0].css;
                const { color:sc, label:sl } = STAMP[ev.filter]||STAMP.classified;
                return (
                  <div key={ev.id} onClick={()=>setLightbox(ev)} style={{ cursor:"pointer" }}>
                    <div style={{ position:"relative", border:`1px solid ${C.border}`, borderRadius:6, overflow:"hidden" }}>
                      <img src={ev.src} alt="" style={{ width:"100%", height:110, objectFit:"cover", filter:filterCSS, display:"block" }}/>
                      {ev.filter==="surveillance" && <ScanlineOverlay/>}
                      <div style={{ position:"absolute", bottom:5, right:5, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:7, letterSpacing:"0.2em", color:sc, border:`1px solid ${sc}`, padding:"1px 5px", transform:"rotate(-3deg)", background:"rgba(0,0,0,0.6)" }}>{sl}</div>
                    </div>
                    {ev.caption && <p style={{ fontSize:8, color:C.muted, marginTop:3, letterSpacing:"0.06em", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", margin:"3px 0 0" }}>// {ev.caption.toUpperCase()}</p>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </BottomSheet>
    </>
  );
}

    setUploading(true);

          <span style={{ color:C.blue, fontFamily:"'Rajdhani',sans-serif", fontSize:14, letterSpacing:"0.3em", animation:"blink 1s infinite" }}>PROCESSING...</span>
        </div>
      )}
      <BottomSheet title="DOSSIER INFO" onClose={onClose}>
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          {story.coverImage && (
            <CIAImage src={story.coverImage} filter={story.coverFilter} height={130} showStamp style={{ borderRadius:8 }}/>
          )}
          <button onClick={()=>fileInputRef.current?.click()}
            style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 14px", color:C.grey, fontSize:10, letterSpacing:"0.15em", cursor:"pointer" }}>
            {story.coverImage ? "⟳ CHANGE COVER PHOTO" : "+ ADD COVER PHOTO"}
          </button>
          <div>
            <FieldLabel>TITLE</FieldLabel>
            <input value={title} onChange={e=>setTitle(e.target.value)}
              style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:`1px solid ${C.border}`, borderRadius:8, padding:"11px 14px", color:C.white, fontFamily:"'Special Elite',serif", fontSize:17, outline:"none" }}/>
          </div>
          <div>
            <FieldLabel>STATUS</FieldLabel>
            <div style={{ display:"flex", gap:7, flexWrap:"wrap", marginTop:4 }}>
              {STATUSES.map(s=><PillBtn key={s} active={status===s} onClick={()=>setStatus(s)} color={STATUS_COLORS[s]}>{s}</PillBtn>)}
            </div>
          </div>
          <div>
            <FieldLabel>GENRE</FieldLabel>
            <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginTop:4, maxHeight:110, overflowY:"auto" }}>
              {GENRES.map(g=><PillBtn key={g} active={genre===g} onClick={()=>setGenre(g)}>{g}</PillBtn>)}
            </div>
          </div>
          <div>
            <FieldLabel>LOGLINE</FieldLabel>
            <input value={logline} onChange={e=>setLogline(e.target.value)} placeholder="One line summary..."
              style={{ width:"100%", background:"rgba(255,255,255,0.04)", border:`1px solid ${C.border}`, borderRadius:8, padding:"11px 14px", color:C.greyLight, fontSize:12, outline:"none" }}/>
          </div>
          <button onClick={handleSave}
            style={{ width:"100%", background:C.blue, border:"none", borderRadius:10, padding:"14px", color:C.bg, fontFamily:"'Rajdhani',sans-serif", fontSize:14, fontWeight:700, letterSpacing:"0.2em", cursor:"pointer", marginTop:4 }}>
            SAVE CHANGES
          </button>
        </div>
      </BottomSheet>
    </>
  );
}

function SectionWriter({ section, onSave }) {
  const [content, setContent] = useState(section.content||"");
  const [title,   setTitle]   = useState(section.title);
  const wordCount = content.split(/\s+/).filter(Boolean).length;

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:300, display:"flex", flexDirection:"column", animation:"fadeIn 0.18s ease both" }}>
      {/* Header */}
      <div style={{ background:C.panel, borderBottom:`1px solid ${C.border}`, padding:"12px 18px", paddingTop:"max(12px,env(safe-area-inset-top,12px))", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
        <button onClick={()=>onSave({...section,title,content})}
          style={{ background:"transparent", border:"none", color:C.blue, fontSize:13, cursor:"pointer", letterSpacing:"0.1em", padding:0, flexShrink:0 }}>
          ‹ BACK
        </button>
        <input value={title} onChange={e=>setTitle(e.target.value)}
          style={{ flex:1, background:"transparent", border:"none", color:C.amber, fontFamily:"'Rajdhani',sans-serif", fontSize:14, fontWeight:700, letterSpacing:"0.25em", outline:"none", minWidth:0 }}/>
      </div>
      {/* Writing area */}
      <textarea
        value={content}
        onChange={e=>setContent(e.target.value)}
        autoFocus
        placeholder="Write here..."
        style={{ flex:1, minHeight:0, width:"100%", background:"transparent", border:"none", resize:"none", color:C.white, fontFamily:"'Special Elite',serif", fontSize:16, lineHeight:1.95, padding:"22px 22px", outline:"none", overflowY:"scroll", WebkitOverflowScrolling:"touch", paddingBottom:"max(30px,env(safe-area-inset-bottom,30px))" }}
      />
      {/* Footer */}
      <div style={{ background:C.panel, borderTop:`1px solid ${C.border}`, padding:"6px 18px", paddingBottom:"max(6px,env(safe-area-inset-bottom,6px))", fontSize:9, color:C.muted, textAlign:"right", letterSpacing:"0.1em", flexShrink:0 }}>
        {wordCount} words · {content.length} chars
      </div>
    </div>
  );
}

function DossierDetail({ story, onChange, onBack, onDelete }) {
  const [activeSheet,   setActiveSheet]   = useState(null);
  const [activeSection, setActiveSection] = useState(null);
  const [activeChapter, setActiveChapter] = useState(null);
  const [addingSection, setAddingSection] = useState(false);
  const [newSecTitle,   setNewSecTitle]   = useState("");
  const secCounter = useRef(Date.now()+50000);

  // Migrate old plain-text content into sections on first open — runs once
  const migrated = useRef(false);
  useEffect(() => {
    if (!story.sections && !migrated.current) {
      migrated.current = true;
      const defaults = DEFAULT_SECTIONS.map(s=>({...s}));
      if (story.content) defaults[4] = { ...defaults[4], content:story.content };
      onChange({ ...story, sections:defaults, updatedAt:new Date().toISOString() });
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const sections = story.sections || DEFAULT_SECTIONS.map(s=>({...s}));

  const update = useCallback((fields) => {
    onChange({ ...story, ...fields, updatedAt:new Date().toISOString() });
  }, [story, onChange]);

  const saveSection = (updated) => {
    const newSections = sections.map(s=>s.id===updated.id?updated:s);
    update({ sections:newSections });
    setActiveSection(null);
  };

  const addSection = () => {
    if (!newSecTitle.trim()) return;
    const newSec = { id:`s${secCounter.current++}`, title:newSecTitle.trim().toUpperCase(), content:"" };
    update({ sections:[...sections, newSec] });
    setNewSecTitle(""); setAddingSection(false);
  };

  const deleteSection = (id) => {
    update({ sections:sections.filter(s=>s.id!==id) });
  };

  const chapDone  = story.chapters?.filter(c=>c.done).length||0;
  const chapTotal = story.chapters?.length||0;
  const statusColor = STATUS_COLORS[story.status]||C.grey;
  const totalWords = sections.reduce((acc,s)=>acc+(s.content||"").split(/\s+/).filter(Boolean).length,0);

  const saveChapterFromDetail = (updated) => {
    update({ chapters:story.chapters.map(c=>c.id===updated.id?updated:c) });
    setActiveChapter(null);
  };

  const openSheet  = (name) => setActiveSheet(name);
  const closeSheet = ()     => setActiveSheet(null);

  // Chapter writer open
  if (activeChapter) {
    return (
      <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:300, display:"flex", flexDirection:"column", animation:"fadeIn 0.18s ease both" }}>
        <div style={{ background:C.panel, borderBottom:`1px solid ${C.border}`, padding:"12px 18px", paddingTop:"max(12px,env(safe-area-inset-top,12px))", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
          <button onClick={()=>saveChapterFromDetail(activeChapter)}
            style={{ background:"transparent", border:"none", color:C.blue, fontSize:13, cursor:"pointer", letterSpacing:"0.1em", padding:0, flexShrink:0 }}>
            ‹ BACK
          </button>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontFamily:"'Special Elite',serif", fontSize:14, color:C.white, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{activeChapter.title}</div>
            <div style={{ fontSize:8, color:C.muted, letterSpacing:"0.1em", marginTop:2 }}>{activeChapter.done?"✓ COMPLETE":"IN PROGRESS"}</div>
          </div>
          <button onClick={()=>setActiveChapter({...activeChapter,done:!activeChapter.done})}
            style={{ background:activeChapter.done?"rgba(80,170,96,0.15)":"transparent", border:`1px solid ${activeChapter.done?C.green:C.border}`, borderRadius:8, padding:"5px 10px", color:activeChapter.done?C.green:C.grey, fontSize:9, letterSpacing:"0.12em", cursor:"pointer", flexShrink:0 }}>
            {activeChapter.done?"✓ DONE":"MARK DONE"}
          </button>
        </div>
        <textarea
          value={activeChapter.content||""}
          onChange={e=>setActiveChapter({...activeChapter,content:e.target.value})}
          autoFocus
          placeholder={`Write notes for "${activeChapter.title}" here...\n\nScene ideas, dialogue, character beats, research — anything that belongs in this chapter.`}
          style={{ flex:1, minHeight:0, width:"100%", background:"transparent", border:"none", resize:"none", color:C.white, fontFamily:"'Special Elite',serif", fontSize:16, lineHeight:1.95, padding:"22px 22px", outline:"none", overflowY:"scroll", WebkitOverflowScrolling:"touch", paddingBottom:"max(30px,env(safe-area-inset-bottom,30px))" }}
        />
        <div style={{ background:C.panel, borderTop:`1px solid ${C.border}`, padding:"6px 18px", paddingBottom:"max(6px,env(safe-area-inset-bottom,6px))", fontSize:9, color:C.muted, textAlign:"right", letterSpacing:"0.1em", flexShrink:0 }}>
          {(activeChapter.content||"").split(/\s+/).filter(Boolean).length} words
        </div>
      </div>
    );
  }

  // Section writer open
  if (activeSection) {
    return <SectionWriter section={activeSection} onSave={saveSection} onBack={()=>setActiveSection(null)}/>;
  }

  return (
    <>
      {activeSheet==="chapters" && <ChaptersSheet story={story} onUpdate={update} onClose={closeSheet}/>}
      {activeSheet==="evidence" && <EvidenceSheet story={story} onUpdate={update} onClose={closeSheet}/>}
      {activeSheet==="info"     && <InfoSheet     story={story} onUpdate={update} onClose={closeSheet}/>}

      <div style={{ position:"fixed", inset:0, background:C.bg, display:"flex", flexDirection:"column" }}>

        {/* ── Top bar ── */}
        <div style={{ background:C.panel, borderBottom:`1px solid ${C.border}`, padding:"10px 16px", paddingTop:"max(10px,env(safe-area-inset-top,10px))", display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
          <button onClick={onBack}
            style={{ background:"transparent", border:"none", color:C.blue, fontSize:13, cursor:"pointer", letterSpacing:"0.1em", padding:0, flexShrink:0 }}>
            ‹ ARCHIVE
          </button>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontFamily:"'Special Elite',serif", fontSize:15, color:C.white, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{story.title}</div>
            <div style={{ display:"flex", gap:6, alignItems:"center", marginTop:2 }}>
              <span style={{ fontSize:8, color:statusColor, letterSpacing:"0.1em", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>{story.status}</span>
              <span style={{ fontSize:8, color:C.muted }}>·</span>
              <span style={{ fontSize:8, color:C.muted }}>{story.genre}</span>
              <span style={{ fontSize:8, color:C.muted }}>·</span>
              <span style={{ fontSize:8, color:C.muted }}>{totalWords}w total</span>
            </div>
          </div>
          <button onClick={()=>openSheet("info")}
            style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:6, padding:"5px 10px", color:C.grey, fontSize:9, letterSpacing:"0.1em", cursor:"pointer", flexShrink:0 }}>
            INFO
          </button>
        </div>

        {/* ── Scrollable body ── */}
        <div style={{ flex:1, minHeight:0, overflowY:"scroll", WebkitOverflowScrolling:"touch" }}>

          {/* ── SECTIONS ── */}
          <div style={{ padding:"16px 16px 8px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
              <span style={{ fontSize:9, color:C.grey, letterSpacing:"0.22em", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>FIELD NOTES</span>
              <button onClick={()=>setAddingSection(v=>!v)}
                style={{ background:addingSection?C.blueFaint:"transparent", border:`1px solid ${addingSection?C.blue:C.border}`, borderRadius:8, padding:"4px 10px", color:addingSection?C.blue:C.grey, fontSize:9, letterSpacing:"0.1em", cursor:"pointer" }}>
                {addingSection?"CANCEL":"+ SECTION"}
              </button>
            </div>

            {addingSection && (
              <div style={{ display:"flex", gap:7, marginBottom:10, animation:"fadeUp 0.15s ease both" }}>
                <input value={newSecTitle} onChange={e=>setNewSecTitle(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addSection()} placeholder="Section name..." autoFocus
                  style={{ flex:1, background:"rgba(255,255,255,0.05)", border:`1px solid ${C.blue}`, borderRadius:8, padding:"9px 12px", color:C.white, fontSize:13, outline:"none" }}/>
                <button onClick={addSection}
                  style={{ background:C.blue, border:"none", borderRadius:8, padding:"9px 14px", color:C.bg, fontSize:16, fontWeight:700, cursor:"pointer" }}>+</button>
              </div>
            )}

            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {sections.map(sec => {
                const wc = (sec.content||"").split(/\s+/).filter(Boolean).length;
                return (
                  <div key={sec.id} onClick={()=>setActiveSection(sec)}
                    style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${sec.content?C.borderBright:C.border}`, borderRadius:12, padding:"14px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:12, transition:"all 0.12s" }}>
                    {/* Left accent */}
                    <div style={{ width:3, alignSelf:"stretch", background:sec.content?C.amber:C.muted, borderRadius:2, flexShrink:0, opacity:0.7 }}/>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:13, fontWeight:700, color:sec.content?C.amber:C.greyLight, letterSpacing:"0.2em" }}>
                        {sec.title}
                      </div>
                      {sec.content ? (
                        <div style={{ fontSize:12, color:C.greyLight, marginTop:5, lineHeight:1.5, fontFamily:"'Special Elite',serif", overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>
                          {sec.content}
                        </div>
                      ) : (
                        <div style={{ fontSize:11, color:C.muted, marginTop:4, fontStyle:"italic" }}>
                          Tap to write...
                        </div>
                      )}
                      {wc>0 && <div style={{ fontSize:8, color:C.muted, marginTop:5, letterSpacing:"0.08em" }}>{wc} words</div>}
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                      <span style={{ color:C.blue, fontSize:18 }}>›</span>
                      <button onClick={e=>{e.stopPropagation();if(window.confirm(`Delete "${sec.title}"?`))deleteSection(sec.id);}}
                        style={{ background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:14, lineHeight:1, padding:0 }}>×</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── CHAPTERS — big and prominent ── */}
          <div style={{ padding:"16px 16px 40px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
              <span style={{ fontSize:9, color:C.grey, letterSpacing:"0.22em", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>
                CHAPTERS {chapTotal>0?`— ${chapDone}/${chapTotal} COMPLETE`:""}
              </span>
              <button onClick={()=>openSheet("chapters")}
                style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:8, padding:"4px 10px", color:C.grey, fontSize:9, letterSpacing:"0.1em", cursor:"pointer" }}>
                + ADD / MANAGE
              </button>
            </div>

            {chapTotal>0 && (
              <div style={{ height:3, background:C.blueFaint, borderRadius:2, overflow:"hidden", marginBottom:14 }}>
                <div style={{ height:"100%", width:`${(chapDone/chapTotal)*100}%`, background:`linear-gradient(90deg,${C.blueDim},${C.blue})`, transition:"width 0.3s" }}/>
              </div>
            )}

            {chapTotal===0 ? (
              <div onClick={()=>openSheet("chapters")}
                style={{ border:`1.5px dashed ${C.border}`, borderRadius:12, padding:"22px 20px", textAlign:"center", cursor:"pointer" }}>
                <div style={{ fontSize:9, color:C.muted, letterSpacing:"0.2em" }}>NO CHAPTERS YET</div>
                <div style={{ fontSize:11, color:C.muted, marginTop:5, fontStyle:"italic" }}>Tap to add your first chapter</div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {story.chapters.map(ch=>(
                  <div key={ch.id} onClick={()=>setActiveChapter({...ch})}
                    style={{ background:ch.done?"rgba(79,195,247,0.06)":"rgba(255,255,255,0.03)", border:`1px solid ${ch.done?C.blueDim:C.border}`, borderRadius:14, padding:"16px 18px", cursor:"pointer", display:"flex", alignItems:"center", gap:14 }}>
                    {/* Big checkbox */}
                    <div style={{ width:24, height:24, border:`2px solid ${ch.done?C.blue:C.muted}`, borderRadius:6, background:ch.done?C.blue:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.15s" }}>
                      {ch.done && <span style={{ color:C.bg, fontSize:13, fontWeight:900 }}>✓</span>}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontFamily:"'Special Elite',serif", fontSize:16, color:ch.done?C.greyLight:C.white, textDecoration:ch.done?"line-through":"none", lineHeight:1.3 }}>
                        {ch.title}
                      </div>
                      {ch.content && (
                        <div style={{ fontSize:10, color:C.muted, marginTop:4, letterSpacing:"0.06em" }}>
                          {ch.content.split(/\s+/).filter(Boolean).length} words written
                        </div>
                      )}
                      {!ch.content && (
                        <div style={{ fontSize:10, color:C.muted, marginTop:4, fontStyle:"italic" }}>
                          tap to write notes
                        </div>
                      )}
                    </div>
                    <span style={{ color:ch.done?C.blue:C.muted, fontSize:20 }}>›</span>
                  </div>
                ))}
              </div>
            )}

            {/* Evidence + Burn row */}
            <div style={{ display:"flex", gap:10, marginTop:16 }}>
              <button onClick={()=>openSheet("evidence")}
                style={{ flex:1, background:"rgba(255,255,255,0.03)", border:`1px solid ${C.border}`, borderRadius:10, padding:"12px", color:C.greyLight, fontSize:10, letterSpacing:"0.12em", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                📎 EVIDENCE {(story.evidence||[]).length>0?`(${story.evidence.length})`:""}
              </button>
              <button onClick={()=>{ if(window.confirm(`Burn "${story.title}"?`)){onDelete(story.id);onBack();} }}
                style={{ background:"rgba(204,51,51,0.08)", border:`1px solid ${C.red}44`, borderRadius:10, padding:"12px 16px", color:C.red, fontSize:10, letterSpacing:"0.12em", cursor:"pointer" }}>
                BURN
              </button>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function MainApp() {
  const [stories,  setStories]  = useState(()=>loadFromStorage(SK.stories, DEFAULTS));
  const [activeId, setActiveId] = useState(null);
  const [showNew,  setShowNew]  = useState(false);
  const nextId = useRef(1000);

  useEffect(()=>{ saveToStorage(SK.stories, stories); }, [stories]);

  const addStory    = d   => { const id=nextId.current++; setStories(ss=>[{id,...d},...ss]); setActiveId(id); };
  const updateStory = upd => setStories(ss=>ss.map(s=>s.id===upd.id?upd:s));
  const deleteStory = id  => { setStories(ss=>ss.filter(s=>s.id!==id)); setActiveId(null); };
  const activeStory = stories.find(s=>s.id===activeId);

  return (
    <>
      {showNew && <NewDossierSheet onSave={d=>{addStory(d);setShowNew(false);}} onClose={()=>setShowNew(false)}/>}
      {activeStory
        ? <DossierDetail story={activeStory} onChange={updateStory} onBack={()=>setActiveId(null)} onDelete={deleteStory}/>
        : <DossierList   stories={stories}   onOpen={id=>setActiveId(id)} onNew={()=>setShowNew(true)} onDelete={deleteStory}/>
      }
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ROOT
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [booted, setBooted] = useState(false);
  return (
    <>
      <style>{globalCSS}</style>
      {booted ? <MainApp/> : <BootSequence onComplete={()=>setBooted(true)}/>}
    </>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(App)
    );
  </script>
</body>
